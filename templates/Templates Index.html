<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Orçamento Pessoal</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: auto; padding: 2rem; }
    input, select, button { padding: 0.5rem; margin: 0.5rem 0; width: 100%; }
    h2 { margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>Gestão de Orçamento Pessoal</h1>

  <h2>Nova Categoria</h2>
  <form action="/adicionar_categoria" method="post">
    <input type="text" name="nome" placeholder="Nome da categoria" required>
    <input type="number" step="0.01" name="limite" placeholder="Limite mensal (opcional)">
    <button type="submit">Adicionar Categoria</button>
  </form>

  <h2>Novo Lançamento</h2>
  <form action="/adicionar_lancamento" method="post">
    <input type="date" name="data" required>
    <select name="tipo">
      <option value="receita">Receita</option>
      <option value="despesa">Despesa</option>
    </select>
    <input type="number" step="0.01" name="valor" placeholder="Valor" required>
    <select name="categoria_id" required>
      {% for c in categorias %}
        <option value="{{ c[0] }}">{{ c[1] }}</option>
      {% endfor %}
    </select>
    <input type="text" name="descricao" placeholder="Descrição">
    <button type="submit">Lançar</button>
  </form>

  <a href="/relatorio">Ver Relatório</a>
</body>
</html>
