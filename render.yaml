services:
  - type: web
    name: orcamento-pessoal
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: v1.0
      - key: SECRET_KEY
        generateValue: true
      - key: ORCAMENTO_ADMIN_USER
        value: ""
      - key: ORCAMENTO_ADMIN_PASSWORD
        value: ""
      - key: DATABASE_URL
        fromDatabase:
          name: orcamento-pessoal-db
          property: connectionString

databases:
  - name: orcamento-pessoal-db
    plan: free
